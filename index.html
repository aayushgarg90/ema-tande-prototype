<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ema · Travel &amp; Expense Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F5F1;
    --surface:#FFFFFF;
    --surface-2:#FAFAF8;
    --ink:#20242F;
    --ink-2:#3A3F5C;
    --muted:#6C7291;
    --line:#E4E4E0;
    --line-2:#EDEDEA;
    --primary:#3D7A46;
    --primary-rgb:61,122,70;
    --primary-deep:#2E5E37;
    --primary-tint:#E7F2E9;
    --agent:#4CAF61;
    --agent-rgb:76,175,97;
    --agent-tint:#E7F7EC;
    --agent-glow:rgba(76,175,97,.35);
    --success:#12A366;
    --success-tint:#E6F7EF;
    --warn:#E08600;
    --warn-tint:#FEF2DD;
    --warn-line:#F7D9A6;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --shadow-sm:0 1px 2px rgba(16,19,42,.05),0 1px 3px rgba(16,19,42,.04);
    --shadow-md:0 4px 12px -6px rgba(16,19,42,.10),0 1px 3px rgba(16,19,42,.05);
    --shadow-lg:0 12px 32px -12px rgba(32,36,47,.16),0 4px 10px -4px rgba(16,19,42,.10);
    --radius:10px;
  }
  /* Per-persona themes — tab 1 (Employee/green, brand default), tab 2 (Manager/indigo), tab 3 (Finance/rose).
     Distinct accent hues make it unmistakable which tab/persona you're in as you switch. */
  body.theme-manager{
    --primary:#4F46E5; --primary-rgb:79,70,229; --primary-deep:#3A31C4; --primary-tint:#EEF0FF;
    --agent:#6D5DF6; --agent-rgb:109,93,246; --agent-tint:#EFEBFF; --agent-glow:rgba(109,93,246,.35);
  }
  body.theme-finance{
    --primary:#BE185D; --primary-rgb:190,24,93; --primary-deep:#9D174D; --primary-tint:#FCE7F3;
    --agent:#EC4899; --agent-rgb:236,72,153; --agent-tint:#FDF2F8; --agent-glow:rgba(236,72,153,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Inter",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    transition:background-color .25s ease;
    min-height:100vh;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:8px}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    backdrop-filter:saturate(180%) blur(10px);
    background:rgba(255,255,255,.82);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1080px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;gap:20px;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand-logo{height:24px;width:auto;flex:0 0 auto;display:block}
  .brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0}
  .brand-text span{font-size:11.5px;color:var(--muted);font-weight:500}

  .roles{position:relative;display:flex;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:2px}
  .role-btn{
    display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;
    font-size:13.5px;font-weight:600;color:var(--ink-2);transition:all .18s ease;white-space:nowrap;
  }
  .role-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:background .18s}
  .role-btn:hover{color:var(--ink)}
  .role-btn.active{background:var(--surface);color:var(--primary-deep);box-shadow:var(--shadow-sm)}
  .role-btn.active .dot{background:var(--primary)}

  /* ---------- Onboarding tooltips (auto-shown, dismissible, shared style) ---------- */
  .tip-bubble{
    position:absolute;top:calc(100% + 12px);left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:12.5px;font-weight:500;line-height:1.5;
    padding:11px 30px 11px 14px;border-radius:10px;width:max-content;max-width:300px;text-align:left;
    box-shadow:var(--shadow-md);z-index:80;animation:tipIn .25s ease;
  }
  .tip-bubble b{color:#fff;font-weight:700}
  .tip-bubble::before{
    content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
    border:6px solid transparent;border-bottom-color:var(--ink);
  }
  .tip-bubble.hidden{display:none}
  .tip-close{
    position:absolute;top:6px;right:6px;width:19px;height:19px;border-radius:6px;
    display:grid;place-items:center;color:rgba(255,255,255,.65);font-size:13px;line-height:1;
    transition:all .15s ease;
  }
  .tip-close:hover{background:rgba(255,255,255,.16);color:#fff}
  @keyframes tipIn{from{opacity:0;transform:translateX(-50%) translateY(-4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

  .restart{
    display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--muted);
    padding:7px 11px;border-radius:9px;border:1px solid var(--line);background:var(--surface);
  }
  .flip-x{transform:scaleX(-1)}
  .back-link{
    display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--muted);
    padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
    flex:0 0 auto;margin-right:10px;white-space:nowrap;box-shadow:var(--shadow-sm);
  }
  .back-link svg{width:14px;height:14px}
  .back-link:hover:not(:disabled){color:var(--primary-deep);border-color:#D2D4E0}
  .back-link:disabled{opacity:.4;cursor:not-allowed;pointer-events:none;box-shadow:none}
  .roi-arrow{width:13px;height:13px;flex:0 0 auto;color:var(--muted)}
  .restart:hover{color:var(--ink);border-color:#D9DBEA}
  .restart svg{width:13px;height:13px}

  /* ---------- Pipeline ribbon ---------- */
  .pipeline{max-width:1080px;margin:0 auto;padding:14px 24px 0;display:flex;align-items:center}
  .pipeline-inner{
    position:relative;flex:1;min-width:0;display:flex;align-items:center;gap:6px;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;padding:10px 14px;box-shadow:var(--shadow-sm);
  }
  .stage{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:10px;flex:0 0 auto}
  .stage .ic{
    width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
    background:var(--line-2);color:var(--muted);transition:all .3s ease;
  }
  .stage .ic svg{width:15px;height:15px}
  .stage .lab{display:flex;flex-direction:column;line-height:1.1}
  .stage .lab b{font-size:12.5px;font-weight:650}
  .stage .lab span{font-size:10px;color:var(--muted);font-weight:500}
  .stage.active .ic{background:var(--primary);color:#fff;box-shadow:0 6px 14px -5px rgba(var(--primary-rgb),.5)}
  .stage.active .lab b{color:var(--primary-deep)}
  .stage.done .ic{background:var(--success-tint);color:var(--success)}
  .stage.agentstage.active .ic{background:var(--agent);box-shadow:0 6px 16px -4px var(--agent-glow)}
  .stage.clickable{cursor:pointer;transition:all .15s ease;border:1px solid transparent}
  .stage.clickable:not(.active){border-color:var(--line)}
  .stage.clickable:hover{background:var(--surface-2);border-color:#D2D4E0}
  .stage.clickable:hover .lab b{color:var(--primary-deep)}
  .stage.clickable:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
  .stage-arrow-wrap{position:relative;flex:1 1 auto;min-width:12px;display:flex;align-items:center}
  .stage-arrow{flex:1 1 auto;height:2px;border-radius:2px;background:var(--line-2)}
  .stage-arrow.flow{background:linear-gradient(90deg,var(--primary),var(--agent))}
  .handoff-mid{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    background:var(--surface);padding:0 8px;font-size:10px;font-weight:650;color:var(--agent);
    display:flex;align-items:center;gap:4px;white-space:nowrap;
  }
  .handoff-mid svg{width:10px;height:10px;flex:0 0 auto}

  /* ---------- Stage / canvas ---------- */
  .stagewrap{max-width:1080px;margin:0 auto;padding:22px 24px 80px}
  .screen{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .badge-trigger{
    display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:650;
    padding:7px 13px;border-radius:22px;margin-bottom:16px;
  }
  .badge-agent{
    background:var(--agent-tint);color:var(--primary-deep);
    box-shadow:0 0 0 4px rgba(var(--agent-rgb),.10);
  }
  .badge-trigger .emo{font-size:14px;line-height:1}

  h2.screen-title{font-size:22px;font-weight:750;letter-spacing:-.02em;margin:2px 0 4px}
  p.screen-sub{color:var(--muted);font-size:14px;margin:0 0 22px;max-width:640px;line-height:1.5}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-md)}

  /* ---------- Chat (screen 1) ---------- */
  .chat-label{
    display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:650;color:var(--muted);
    max-width:720px;margin:0 auto 10px;
  }
  .chat-label svg{width:15px;height:15px;color:var(--agent)}
  .chat-shell{max-width:720px;margin:0 auto}
  .chat-window{padding:20px;min-height:230px;display:flex;flex-direction:column;gap:14px}
  .chat-empty{
    margin:auto;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:12px;padding:24px 0;
  }
  .chat-empty .halo{
    width:56px;height:56px;border-radius:16px;display:grid;place-items:center;
    background:linear-gradient(140deg,var(--primary),var(--agent));color:#fff;box-shadow:var(--shadow-lg);
  }
  .chat-empty .halo svg{width:26px;height:26px}
  .chat-empty b{color:var(--ink);font-size:15px;font-weight:650}
  .chat-empty p{margin:0;font-size:13px;max-width:280px}

  .bubble{display:flex;gap:11px;align-items:flex-start;animation:rise .3s ease both}
  .bubble.user{flex-direction:row-reverse}
  .avatar{width:30px;height:30px;border-radius:9px;flex:0 0 auto;display:grid;place-items:center;font-size:14px}
  .avatar.agent{background:var(--agent-tint);color:var(--agent)}
  .avatar.agent svg{width:16px;height:16px}
  .avatar.user{background:var(--primary);color:#fff;font-weight:650;font-size:12px}
  .bubble-body{padding:11px 14px;border-radius:13px;font-size:14px;line-height:1.5;max-width:78%}
  .bubble.agent .bubble-body{background:var(--agent-tint);color:#33306A;border-top-left-radius:4px}
  .bubble.user .bubble-body{background:var(--primary);color:#fff;border-top-right-radius:4px}

  .thinking{display:flex;gap:5px;padding:4px 2px;align-items:center}
  .thinking i{width:7px;height:7px;border-radius:50%;background:var(--agent);opacity:.5;animation:blink 1.2s infinite}
  .thinking i:nth-child(2){animation-delay:.2s}
  .thinking i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.35;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  .composer{border-top:1px solid var(--line-2);padding:14px 16px;display:flex;flex-direction:column;gap:11px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    font-size:12.5px;font-weight:550;color:var(--primary-deep);background:var(--primary-tint);
    border:1px solid #CFE6D2;padding:8px 13px;border-radius:20px;transition:all .16s;text-align:left;
  }
  .chip:hover{background:#DCEFDF;transform:translateY(-1px)}
  .composer-row{display:flex;gap:10px;align-items:center}
  .composer-row input{
    flex:1;padding:12px 15px;border-radius:12px;border:1px solid var(--line);background:var(--surface-2);
    font-size:14px;font-family:inherit;color:var(--ink);
  }
  .composer-row input:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px var(--primary-tint)}
  .send-btn{
    width:44px;height:44px;border-radius:12px;background:var(--primary);color:#fff;display:grid;place-items:center;flex:0 0 auto;
    transition:background .16s;
  }
  .send-btn:hover{background:var(--primary-deep)}
  .send-btn svg{width:18px;height:18px}

  /* ---------- Itinerary (screen 2) ---------- */
  .itin-grid{display:grid;grid-template-columns:1fr;gap:14px;max-width:760px;margin:0 auto}
  .opt{padding:18px 18px 16px;position:relative;transition:box-shadow .2s,border-color .2s}
  .opt.recommended{border-color:#BFE0C4;box-shadow:0 14px 34px -16px rgba(61,122,70,.35)}
  .opt-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
  .opt-tag{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:5px 10px;border-radius:7px}
  .opt-tag.rec{background:var(--primary);color:#fff}
  .opt-tag.alt{background:var(--line-2);color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:650;padding:4px 10px;border-radius:20px}
  .pill.ok{background:var(--success-tint);color:var(--success)}
  .pill.flag{background:var(--warn-tint);color:var(--warn)}
  .pill svg{width:12px;height:12px}
  .leg{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line-2)}
  .leg:first-of-type{border-top:none}
  .leg .lic{width:30px;height:30px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--ink-2);flex:0 0 auto}
  .leg .lic svg{width:15px;height:15px}
  .leg .ldesc{flex:1;min-width:0}
  .leg .ldesc b{font-size:13.5px;font-weight:600;display:block}
  .leg .ldesc span{font-size:12px;color:var(--muted)}
  .leg .lprice{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink)}
  .opt-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--line-2)}
  .opt-total{font-size:13px;color:var(--muted)}
  .opt-total b{font-family:var(--mono);font-size:18px;color:var(--ink);font-weight:700;margin-left:6px}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:650;
    padding:11px 20px;border-radius:12px;transition:all .16s;
  }
  .btn svg{width:16px;height:16px}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 8px 18px -8px rgba(var(--primary-rgb),.5)}
  .btn-primary:hover{background:var(--primary-deep)}
  .btn-ghost{background:var(--surface);color:var(--ink-2);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:#D2D4E4;color:var(--ink)}
  .btn-agent{background:var(--agent);color:#fff;box-shadow:0 8px 20px -6px var(--agent-glow)}
  .btn-agent:hover{filter:brightness(1.05)}
  .btn-block{width:100%}

  /* ---------- Trip watch (screen 3) ---------- */
  .watch{max-width:720px;margin:0 auto}
  .watch-card{padding:26px;display:flex;align-items:center;gap:18px}
  .radar{width:52px;height:52px;border-radius:50%;flex:0 0 auto;position:relative;display:grid;place-items:center;background:var(--primary-tint);color:var(--primary)}
  .radar svg{width:24px;height:24px;position:relative;z-index:2}
  .radar::before,.radar::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid var(--primary);opacity:0;animation:ping 2.4s ease-out infinite}
  .radar::after{animation-delay:1.2s}
  @keyframes ping{0%{transform:scale(.7);opacity:.6}100%{transform:scale(1.7);opacity:0}}
  .watch-card .wtext b{font-size:16px;font-weight:700;display:block;margin-bottom:2px}
  .watch-card .wtext span{font-size:13.5px;color:var(--muted)}
  .watch-steps{margin-top:16px;display:flex;flex-direction:column;gap:0}
  .wstep{display:flex;gap:12px;align-items:center;font-size:13px;color:var(--muted);padding:8px 4px}
  .wstep .wtick{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center}
  .wstep.done{color:var(--ink-2)}
  .wstep.done .wtick{border-color:var(--success);background:var(--success);color:#fff}
  .wstep.done .wtick svg{width:11px;height:11px}
  .wstep.pending .wtick{border-color:var(--agent);animation:pulse-b 1.4s infinite}
  @keyframes pulse-b{0%,100%{box-shadow:0 0 0 0 var(--agent-glow)}50%{box-shadow:0 0 0 5px rgba(var(--agent-rgb),0)}}

  .notif{
    margin-top:20px;padding:20px;border-radius:var(--radius);
    background:linear-gradient(180deg,#F5FAF6,#FFFFFF);
    border:1.5px solid #CFE6D2;box-shadow:var(--shadow-lg);
    display:flex;gap:16px;align-items:flex-start;
    animation:notif-in .6s cubic-bezier(.16,.9,.3,1) both;
  }
  @keyframes notif-in{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:none}}
  .notif .nic{width:44px;height:44px;border-radius:12px;flex:0 0 auto;background:var(--agent);color:#fff;display:grid;place-items:center;box-shadow:0 8px 18px -6px var(--agent-glow)}
  .notif .nic svg{width:22px;height:22px}
  .notif .nbody{flex:1}
  .notif .ntitle{font-size:15px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:8px}
  .notif .ntitle .live{font-size:10px;font-weight:700;color:var(--agent);background:var(--agent-tint);padding:2px 7px;border-radius:20px;letter-spacing:.03em}
  .notif .nsub{font-size:13.5px;color:var(--ink-2);line-height:1.5;margin-bottom:14px}
  .notif .nsub b{color:var(--ink)}

  /* ---------- Report (screen 4) ---------- */
  .report{max-width:900px;margin:0 auto}
  .report-head{padding:20px 22px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line-2)}
  .report-head .rh-l h3{margin:0 0 4px;font-size:18px;font-weight:750;letter-spacing:-.01em}
  .report-head .rh-l .meta{font-size:13px;color:var(--muted)}
  .assembled{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:650;color:var(--agent);background:var(--agent-tint);padding:6px 11px;border-radius:20px;margin-top:9px}
  .assembled svg{width:13px;height:13px}
  .report-head .rh-r{text-align:right}
  .report-head .rh-r .tot-lab{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .report-head .rh-r .tot-val{font-family:var(--mono);font-size:26px;font-weight:750;letter-spacing:-.01em}
  .report-head .rh-r .tot-note{font-size:12px;color:var(--success);font-weight:600;margin-top:2px}

  .tbl{width:100%;border-collapse:collapse;font-size:13px}
  .tbl thead th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:650;
    padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface-2);
  }
  .tbl thead th.num{text-align:right}
  .tbl tbody td{padding:12px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  .tbl tbody tr:last-child td{border-bottom:none}
  .tbl .m-name{font-weight:600;color:var(--ink);display:flex;align-items:center;gap:9px}
  .tbl .rcpt{width:26px;height:26px;border-radius:7px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);flex:0 0 auto}
  .tbl .rcpt svg{width:13px;height:13px}
  .tbl .m-sub{font-size:11.5px;color:var(--muted);font-weight:400}
  .tbl .amt{font-family:var(--mono);text-align:right;font-weight:600;white-space:nowrap}
  .gl{font-family:var(--mono);font-size:11.5px;color:var(--ink-2)}
  .src{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;white-space:nowrap}
  .src svg{width:11px;height:11px}
  .src.corp{background:var(--primary-tint);color:var(--primary-deep)}
  .src.email{background:#E7F1FF;color:#2563C9}
  .src.snap{background:#EAF7EE;color:#178A4E}
  .cat-pill{font-size:11.5px;color:var(--ink-2)}
  .row-ok .stat{color:var(--success)}
  .stat{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600}
  .stat svg{width:13px;height:13px}
  tr.row-flag{background:var(--warn-tint)}
  tr.row-flag td{border-bottom-color:var(--warn-line)}
  tr.row-flag .stat{color:var(--warn)}

  .exception-panel{margin:0;border-top:1px dashed var(--warn-line);background:linear-gradient(180deg,#FEFAF2,#fff);padding:16px 18px;display:flex;gap:13px;align-items:flex-start}
  .exception-panel.hide{display:none}
  .exception-panel .eic{width:34px;height:34px;border-radius:10px;flex:0 0 auto;background:var(--warn-tint);color:var(--warn);display:grid;place-items:center}
  .exception-panel .eic svg{width:18px;height:18px}
  .exception-panel .ebody{flex:1}
  .exception-panel .etitle{font-size:13px;font-weight:700;margin-bottom:3px}
  .exception-panel .eq{font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:12px}
  .exception-panel .eq b{color:var(--ink)}
  .eactions{display:flex;flex-wrap:wrap;gap:8px}
  .ebtn{font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink-2);transition:all .15s}
  .ebtn:hover{border-color:#D2D4E4;color:var(--ink)}
  .ebtn.primary{background:var(--warn);color:#fff;border-color:var(--warn)}
  .ebtn.primary:hover{filter:brightness(1.04)}

  .resolved-note{margin:0;padding:14px 18px;background:var(--success-tint);border-top:1px solid #C9EED9;display:none;gap:10px;align-items:center;font-size:13px;color:#0F7A4C;font-weight:550}
  .resolved-note.show{display:flex}
  .resolved-note svg{width:16px;height:16px;flex:0 0 auto}

  .report-foot{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;border-top:1px solid var(--line-2);flex-wrap:wrap}
  .report-foot .rf-note{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .report-foot .rf-note svg{width:14px;height:14px;color:var(--agent)}

  /* ---------- Snap-a-receipt (out-of-pocket capture) ---------- */
  .snap-card{max-width:900px;margin:16px auto 0;padding:18px 20px}
  .snap-idle{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .snap-idle .si-ic{width:36px;height:36px;border-radius:10px;background:var(--agent-tint);color:var(--agent);display:grid;place-items:center;flex:0 0 auto}
  .snap-idle .si-ic svg{width:18px;height:18px}
  .snap-idle .si-txt{flex:1;min-width:220px}
  .snap-idle .si-txt b{font-size:13.5px;font-weight:650;display:block}
  .snap-idle .si-txt span{font-size:12.5px;color:var(--muted)}
  .snap-flow{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
  .snap-thumb{width:110px;border-radius:10px;border:1px solid var(--line);box-shadow:var(--shadow-sm);flex:0 0 auto}
  .snap-status{flex:1;min-width:220px;padding-top:4px}
  .snap-status .ss-title{font-size:13.5px;font-weight:650;margin-bottom:4px}
  .snap-status .ss-sub{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .snap-fields{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
  .snap-field{display:flex;justify-content:space-between;font-size:12.5px;padding:7px 10px;background:var(--surface-2);border-radius:8px}
  .snap-field span:first-child{color:var(--muted)}
  .snap-field span:last-child{font-weight:600;color:var(--ink)}
  .snap-done{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--success);font-weight:600}
  .snap-done svg{width:16px;height:16px;flex:0 0 auto}

  /* ---------- Expense Hub (Expense Agent digest) ---------- */
  .exp-hub{display:flex;flex-direction:column;gap:16px;max-width:760px;margin:0 auto}
  .exp-section{padding:18px 20px}
  .exp-section.muted{background:var(--surface-2)}
  .exp-sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .exp-sec-head h4{margin:0;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-2)}
  .exp-count{font-size:11px;font-weight:700;color:var(--muted);background:var(--line-2);padding:2px 9px;border-radius:20px}
  .exp-row{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-top:1px solid var(--line-2)}
  .exp-row:first-of-type{border-top:none;padding-top:8px}
  .exp-row .eic{width:38px;height:38px;border-radius:10px;background:var(--agent-tint);color:var(--agent);display:grid;place-items:center;flex:0 0 auto}
  .exp-row .eic svg{width:19px;height:19px}
  .exp-row.done .eic{background:var(--success-tint);color:var(--success)}
  .exp-row .ebody{flex:1;min-width:0}
  .exp-row .ebody b{font-size:14px;font-weight:650;display:block}
  .exp-row .ebody .emeta{font-size:12px;color:var(--muted);margin-top:1px}
  .exp-row .eline{font-size:12.5px;color:var(--ink-2);margin-top:7px;line-height:1.4;display:flex;align-items:flex-start;gap:6px}
  .exp-row .eline svg{width:12px;height:12px;color:var(--agent);flex:0 0 auto;margin-top:2px}
  .exp-row .eamt{text-align:right;flex:0 0 auto}
  .exp-row .eamt b{font-family:var(--mono);font-size:15px;font-weight:700;display:block}
  .exp-row .eamt span{font-size:11px;color:var(--muted)}
  .exp-row .eaction{margin-top:11px}

  /* ---------- Manager (screen 5) ---------- */
  .approval{max-width:640px;margin:0 auto}
  .appr-card{padding:0;overflow:hidden}
  .appr-top{padding:18px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line-2);background:var(--surface-2)}
  .appr-top .aic{width:36px;height:36px;border-radius:10px;background:var(--agent-tint);color:var(--agent);display:grid;place-items:center;flex:0 0 auto}
  .appr-top .aic svg{width:19px;height:19px}
  .appr-top b{font-size:14px;font-weight:700;display:block}
  .appr-top span{font-size:12px;color:var(--muted)}
  .appr-body{padding:20px}
  .appr-summary{font-size:15px;line-height:1.6;color:var(--ink-2)}
  .appr-summary b{color:var(--ink);font-weight:700}
  .appr-stats{display:flex;gap:10px;margin:16px 0 4px;flex-wrap:wrap}
  .astat{flex:1;min-width:130px;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .astat .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:4px}
  .astat .v{font-size:16px;font-weight:700;font-family:var(--mono)}
  .astat.good .v{color:var(--success)}
  .astat.warnv .v{color:var(--warn)}
  .exc-detail{margin-top:16px;border:1px solid var(--warn-line);background:var(--warn-tint);border-radius:12px;padding:14px 16px}
  .exc-detail .ed-t{font-size:12px;font-weight:700;color:var(--warn);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .exc-detail .ed-t svg{width:13px;height:13px}
  .exc-detail .ed-b{font-size:13.5px;color:var(--ink-2);line-height:1.5}
  .exc-detail .ed-b b{color:var(--ink)}
  .ctx-line{margin-top:14px;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-2);background:var(--primary-tint);border-radius:10px;padding:11px 13px}
  .ctx-line svg{width:16px;height:16px;color:var(--primary);flex:0 0 auto}
  .ctx-line b{color:var(--primary-deep)}
  .appr-actions{display:flex;gap:10px;margin-top:20px}
  .appr-foot-note{font-size:12px;color:var(--muted);margin-top:14px;display:flex;align-items:center;gap:7px;line-height:1.4}
  .appr-foot-note svg{width:14px;height:14px;flex:0 0 auto;color:var(--muted)}

  /* ---------- Finance (screen 6) ---------- */
  .finance{max-width:920px;margin:0 auto}
  .fin-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
  .fin-panel{padding:18px 20px}
  .fin-panel h4{margin:0 0 3px;font-size:14px;font-weight:700}
  .fin-panel .ph-sub{font-size:12px;color:var(--muted);margin:0 0 16px}
  .barrow{display:flex;align-items:center;gap:12px;margin-bottom:13px}
  .barrow .blab{width:118px;font-size:12.5px;color:var(--ink-2);font-weight:550;flex:0 0 auto}
  .bartrack{flex:1;height:9px;background:var(--line-2);border-radius:6px;overflow:hidden}
  .barfill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--primary),var(--agent));animation:grow 1s cubic-bezier(.2,.7,.3,1) both}
  @keyframes grow{from{width:0}}
  .barrow .bval{width:64px;text-align:right;font-family:var(--mono);font-size:12.5px;font-weight:600;flex:0 0 auto}
  .fin-total{display:flex;align-items:center;justify-content:space-between;margin-top:4px;padding-top:14px;border-top:1px solid var(--line-2)}
  .fin-total span{font-size:13px;color:var(--muted);font-weight:600}
  .fin-total b{font-family:var(--mono);font-size:20px;font-weight:750}

  .trip-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-2)}
  .trip-row:last-child{border-bottom:none}
  .trip-row .tic{width:34px;height:34px;border-radius:9px;background:var(--primary-tint);color:var(--primary);display:grid;place-items:center;flex:0 0 auto}
  .trip-row .tic svg{width:17px;height:17px}
  .trip-row .tinfo{flex:1;min-width:0}
  .trip-row .tinfo b{font-size:13.5px;font-weight:600;display:block}
  .trip-row .tinfo span{font-size:11.5px;color:var(--muted)}
  .status-pill{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--success-tint);color:var(--success);display:inline-flex;align-items:center;gap:5px}
  .status-pill svg{width:11px;height:11px}
  .status-pill.warn{background:var(--warn-tint);color:var(--warn)}
  .clean-checks{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .ccheck{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-2)}
  .ccheck .cc-ic{width:18px;height:18px;border-radius:50%;background:var(--success-tint);color:var(--success);display:grid;place-items:center;flex:0 0 auto}
  .ccheck .cc-ic svg{width:11px;height:11px}
  .fin-caption{margin:16px auto 0;font-size:12px;color:var(--muted);line-height:1.5;display:flex;gap:8px;align-items:flex-start;max-width:900px}
  .fin-caption svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px;color:var(--muted)}

  /* ---------- Guided CTA / toast ---------- */
  .guide{
    margin-top:20px;padding:15px 18px;border-radius:14px;border:1px dashed #BFDDC4;background:var(--surface);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  }
  .guide .g-ic{width:32px;height:32px;border-radius:9px;background:var(--agent-tint);color:var(--agent);display:grid;place-items:center;flex:0 0 auto}
  .guide .g-ic svg{width:17px;height:17px}
  .guide .g-txt{flex:1;min-width:180px}
  .guide .g-txt b{font-size:13.5px;font-weight:650;display:block}
  .guide .g-txt span{font-size:12.5px;color:var(--muted)}

  .success-hero{max-width:640px;text-align:center;padding:40px 30px}
  .success-hero .sh-ic{width:64px;height:64px;border-radius:50%;margin:0 auto 16px;background:var(--success-tint);color:var(--success);display:grid;place-items:center;animation:pop .4s cubic-bezier(.2,1.3,.4,1) both}
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .success-hero .sh-ic svg{width:32px;height:32px}
  .success-hero h3{font-size:20px;font-weight:750;margin:0 0 6px}
  .success-hero p{color:var(--muted);font-size:14px;margin:0 auto 22px;max-width:400px;line-height:1.5}

  .visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

  @media (max-width:860px){
    .fin-grid{grid-template-columns:1fr}
    .pipeline-inner{overflow-x:auto}
    .topbar-inner{flex-wrap:wrap;gap:12px}
    .roles{order:3;width:100%;justify-content:space-between}
    .report{overflow-x:auto}
    .tbl{min-width:720px}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s!important;transition-duration:.05s!important}
    .radar::before,.radar::after{display:none}
  }

  /* --- New trip affordances --- */
  .new-trip-cta{ display:flex; justify-content:center; margin:16px 0 4px; }
  .new-trip-float{ display:flex; justify-content:flex-end; margin:14px 2px 2px; }
  .new-trip-float .btn{ font-size:13px; }

  /* --- Empty approvals state --- */
  .empty-approvals{ text-align:center; padding:40px 28px; }
  .empty-approvals .ea-ic{ width:52px; height:52px; margin:0 auto 14px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--good-tint,#e6f6ec); color:var(--good,#1a8f4c); }
  .empty-approvals .ea-ic svg{ width:26px; height:26px; }
  .empty-approvals h3{ font-size:18px; font-weight:750; margin:0 0 6px; }
  .empty-approvals p{ color:var(--muted,#666); max-width:420px; margin:0 auto; font-size:14px; }

  /* --- Tips master toggle --- */
  .tips-toggle{ display:inline-flex; align-items:center; gap:7px; cursor:pointer; user-select:none;
    font-size:12.5px; font-weight:600; color:var(--muted); margin-right:2px; }
  .tips-toggle input{ position:absolute; opacity:0; width:0; height:0; }
  .tips-toggle .tt-track{ width:34px; height:19px; border-radius:20px; background:var(--line);
    position:relative; transition:background .18s ease; flex:0 0 auto; }
  .tips-toggle .tt-thumb{ position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%;
    background:#fff; box-shadow:0 1px 2px rgba(0,0,0,.25); transition:transform .18s ease; }
  .tips-toggle input:checked + .tt-track{ background:var(--accent, #4f46e5); }
  .tips-toggle input:checked + .tt-track .tt-thumb{ transform:translateX(15px); }
  .tips-toggle .tt-label{ line-height:1; }

  .restart-wrap{ position:relative; display:inline-flex; }

  /* Tooltip anchored to a right-side element (restart) — arrow points up-right */
  .tip-bubble.tip-right{ left:auto; right:0; transform:none; }
  .tip-bubble.tip-right::before{ left:auto; right:18px; transform:none; }

  /* Tooltip anchored inside a sub-nav stage — sits below the stage */
  .tip-bubble.tip-stage{ top:calc(100% + 10px); left:50%; transform:translateX(-50%); z-index:90; }
</style>
</head>

// ---------- Back navigation (up to 6 pages) ----------
const NAV_HISTORY=[];
function pageKey(s){ return s.role+'|'+s.empStep+'|'+s.view+'|'+s.mgrView+'|'+s.finView; }
// Wrap any handler that changes which screen is shown. Handlers that only
// change content on the current screen (approve, resolve exception, etc.)
// call render() directly and are intentionally not tracked as "pages".
function go(mutate){
  const before=pageKey(S);
  const snap=JSON.parse(JSON.stringify(S));
  mutate();
  if(pageKey(S)!==before){
    NAV_HISTORY.push(snap);
    if(NAV_HISTORY.length>6) NAV_HISTORY.shift();
  }
  render();
}
function goBack(){
  if(!NAV_HISTORY.length) return;
  Object.assign(S, NAV_HISTORY.pop());
  render();
}

// ---------- Pipeline (contextual per tab — each persona has its own 2 sub-views) ----------
function renderPipeline(){
  let stages, activeKey, isProcess;

  if(S.role==='employee'){
    stages = [
      {key:'travel',  icon:'compass', b:'Travel Agent',  s:'Plan &amp; book the trip', agent:false},
      {key:'expense', icon:'receipt', b:'Expense Agent',  s:'Track approval &amp; reimbursement', agent:true}
    ];
    activeKey = (S.view==='expenseHub' || S.empStep>2) ? 'expense' : 'travel';
    isProcess = true; // a real sequence: travel → expense, worth a hand-off flourish
  } else if(S.role==='manager'){
    stages = [
      {key:'approvals', icon:'clipboardCheck', b:'Approvals',  s:'Review pending requests', agent:false},
      {key:'teamspend', icon:'trendUp',        b:'Team Spend', s:'Trends &amp; budget', agent:false}
    ];
    activeKey = S.mgrView;
    isProcess = false; // two independent lenses, not a progression
  } else {
    stages = [
      {key:'orgspend', icon:'building',       b:'Org Spend',        s:'Company-wide categories', agent:false},
      {key:'budgets',  icon:'clipboardCheck', b:'Budget Approvals', s:'High-level sign-off', agent:false},
      {key:'roi',      icon:'sparkle',        b:'Agent ROI',        s:'Time saved &amp; impact', agent:true}
    ];
    activeKey = S.finView;
    isProcess = false;
  }
  const activeIdx = stages.findIndex(s=>s.key===activeKey);

  let html='';
  stages.forEach((st,i)=>{
    const cls=[ 'stage', st.agent?'agentstage':'', 'clickable' ];
    if(isProcess && i<activeIdx) cls.push('done');
    if(i===activeIdx) cls.push('active');
    html+='<div class="'+cls.join(' ')+'" data-stagekey="'+st.key+'" tabindex="0" role="button">'
        +   '<div class="ic">'+svg(st.icon)+'</div>'
        +   '<div class="lab"><b>'+st.b+'</b><span>'+st.s+'</span></div>'
        + '</div>';
    if(i<stages.length-1){
      const flow = isProcess && (i<activeIdx);
      const midLabel = isProcess
        ? '<span class="handoff-mid">'+svg('sparkle')+'Silent agent-to-agent hand-off</span>'
        : '';
      html+='<div class="stage-arrow-wrap"><div class="stage-arrow'+(flow?' flow':'')+'"></div>'+midLabel+'</div>';
    }
  });
  document.getElementById('pipeline').innerHTML=html;

  // Sub-nav tooltips (#2 expense, #3 teamspend, #4 budgets, #5 roi) anchor to their stage.
  const TIP_ON_STAGE = { expense:'expense', teamspend:'teamspend', budgets:'budgets', roi:'roi' };
  const TIP_TEXT = {
    expense:  'Your Expense Agent\'s home — see reports it filed automatically, or add an out-of-pocket expense it couldn\'t capture on its own.',
    teamspend:'See how your team is spending against budget — approvals, rejections, policy exceptions — and take action.',
    budgets:  'Sign off on high-level budget requests here before the spend is committed.',
    roi:      'The business case — hours saved, faster close, and the measurable ROI the agents deliver.'
  };
  document.querySelectorAll('.stage.clickable').forEach(el=>{
    const key = el.dataset.stagekey;
    if(TIP_ON_STAGE[key] && S.activeTip===key){
      const bub=document.createElement('div');
      bub.className='tip-bubble tip-stage';
      bub.id='stageTip';
      bub.innerHTML='<button class="tip-close" id="stageTipClose" aria-label="Dismiss">&times;</button>'+TIP_TEXT[key];
      el.style.position='relative';
      el.appendChild(bub);
      const close=bub.querySelector('#stageTipClose');
      if(close) close.onclick=(e)=>{ e.stopPropagation(); dismissTip(); };
    }
    el.onclick=()=>goToStage(el.dataset.stagekey);
    el.onkeydown=(e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); goToStage(el.dataset.stagekey); } };
  });
}

// The live Chicago trip's place in its own lifecycle — this is what lets the
// employee track it end-to-end from one tab, without ever visiting Manager.
function liveTripStage(){
  if(S.empStep<4) return null;         // trip not yet ended / report not built
  if(S.approved) return 'approved';
  if(S.sentBack) return 'changes';
  if(S.submitted) return 'submitted';
  if(S.exceptionResolved) return 'ready';
  return 'attention';
}

function render(){
  if(watchTimer){clearTimeout(watchTimer);watchTimer=null;}
  if(snapTimer){clearTimeout(snapTimer);snapTimer=null;}
  renderRoles();
  renderPipeline();
  document.getElementById('backBtn').disabled = NAV_HISTORY.length===0;
  const stage=document.getElementById('stage');
  let html='';

  if(S.role==='employee' && S.view==='expenseHub'){
    html=screenExpenseHub();
  } else if(S.role==='employee'){
    if(S.empStep===1) html=screenChat();
    else if(S.empStep===2) html=screenItinerary();
    else if(S.empStep===3) html=screenTripWatch();
    else if(S.empStep===4){
      html=screenReport();
      if(S.submitted){
        html+=guideToHub('Submitted for approval','Track its status anytime from here — no need to go anywhere. You’ll see it move to approved (or back to you) the moment your manager acts.','View in Expense Agent');
        html+='<div class="new-trip-cta"><button class="btn btn-primary" id="newTripSuccessBtn">'+svg('compass')+'Book a new trip</button></div>';
      }
    }
  } else if(S.role==='manager'){
    html = S.mgrView==='teamspend' ? screenTeamSpend() : screenApprovals();
  } else {
    html = S.finView==='budgets' ? screenBudgetApprovals() : S.finView==='roi' ? screenAgentROI() : screenOrgSpend();
  }

  // Always-available "New trip" affordance on employee screens past the chat
  // (itinerary / trip-watch / report / expense hub). On the chat screen you're
  // already at the start, so we don't show it there.
  if(S.role==='employee' && !(S.view==='main' && S.empStep===1)){
    html += '<div class="new-trip-float"><button class="btn btn-ghost" id="newTripFloatBtn" title="Start a fresh trip">'+svg('compass')+'New trip</button></div>';
  }
  stage.innerHTML=html;
  stage.firstElementChild && stage.firstElementChild.classList.add('screen');
  wire();
  if(typeof tipEngine==='function') tipEngine();
}

function wire(){
  // Role tabs
  document.querySelectorAll('.role-btn').forEach(b=>{
    b.onclick=()=>go(()=>{ S.role=b.dataset.role; S.view='main'; S.mgrView='approvals'; S.finView='orgspend'; });
  });
  // goto buttons (in guides / success heroes)
  document.querySelectorAll('[data-goto]').forEach(b=>{
    b.onclick=()=>go(()=>{ S.role=b.dataset.goto; S.view='main'; S.mgrView='approvals'; S.finView='orgspend'; });
  });

  // Expense hub — preview CTA on the ready-to-approve report
  const reviewReady=document.getElementById('reviewReadyBtn');
  if(reviewReady) reviewReady.onclick=()=>{ S.expPreview=true; render(); };

  // Expense hub — jump into the real report at whatever stage it's at
  const openLive=document.getElementById('openLiveReportBtn');
  if(openLive) openLive.onclick=()=>go(()=>{ S.view='main'; });

  // Same-tab nudge after submitting
  const gth=document.getElementById('guideToHubBtn');
  if(gth) gth.onclick=()=>go(()=>{ S.view='expenseHub'; });

  // Book a new trip — success screen + always-available pill
  const ntSuccess=document.getElementById('newTripSuccessBtn');
  if(ntSuccess) ntSuccess.onclick=newTripReset;
  const ntFloat=document.getElementById('newTripFloatBtn');
  if(ntFloat) ntFloat.onclick=newTripReset;

  // Manager: 'Back to approvals' — clears the approved state and returns to the
  // pending approvals inbox. Stays in the Manager role (no Finance jump).
  const backAppr=document.getElementById('backToApprovalsBtn');
  if(backAppr) backAppr.onclick=()=>{ S.apprCleared=true; S.mgrView='approvals'; render(); };

  // Budget approvals — finance sign-off
  document.querySelectorAll('[data-budget-approve]').forEach(b=>{
    b.onclick=()=>{ BUDGET_REQUESTS.find(r=>r.id===+b.dataset.budgetApprove).status='approved'; render(); };
  });
  document.querySelectorAll('[data-budget-reject]').forEach(b=>{
    b.onclick=()=>{ BUDGET_REQUESTS.find(r=>r.id===+b.dataset.budgetReject).status='rejected'; render(); };
  });

  // Screen 1 — chat
  const chip=document.getElementById('promptChip');
  const input=document.getElementById('chatInput');
  const send=document.getElementById('sendBtn');
  const PROMPT='I need to be in Chicago Thu for the client review, back Fri evening.';
  if(chip) chip.onclick=()=>sendMessage(PROMPT);
  if(send) send.onclick=()=>sendMessage(input.value.trim()||PROMPT);
  if(input) input.onkeydown=e=>{ if(e.key==='Enter') sendMessage(input.value.trim()||PROMPT); };
  // Re-arm the "thinking" transition ONLY when the message was just sent and we
  // have NOT yet advanced to the itinerary. If the user navigated Back to chat
  // (chatAdvanced===true), do NOT auto-advance — let them re-send / edit.
  if(S.role==='employee' && S.empStep===1 && S.chatSent && !S.chatAdvanced){
    setTimeout(()=>go(()=>{ S.empStep=2; S.chatAdvanced=true; }), 1500);
  }

  // Screen 2 — book
  const book=document.getElementById('bookBtn');
  if(book) book.onclick=()=>go(()=>{ S.empStep=3; });
  document.querySelectorAll('[data-selectalt]').forEach(b=>{
    b.onclick=()=>go(()=>{ S.empStep=3; });
  });
  const reqApproval=document.getElementById('requestApprovalBtn');
  if(reqApproval) reqApproval.onclick=()=>{ S.travelApprovalRequested=true; render(); };

  // Screen 3 — review (appears after timer)
  const review=document.getElementById('reviewBtn');
  if(review) review.onclick=()=>go(()=>{ S.empStep=4; });

  // Screen 4 — exception resolve
  const rc=document.getElementById('resolveClient');
  const rp=document.getElementById('resolvePersonal');
  if(rc) rc.onclick=()=>resolveException();
  if(rp) rp.onclick=()=>resolveException();
  const submit=document.getElementById('submitBtn');
  if(submit && !submit.disabled) submit.onclick=()=>{ S.submitted=true; S.sentBack=false; render(); };

  // Screen 4 — snap a receipt (out-of-pocket, no card/email trail)
  const snapBtn=document.getElementById('snapBtn');
  if(snapBtn) snapBtn.onclick=()=>{
    S.snapStep=1; render();
    snapTimer=setTimeout(()=>{
      S.snapStep=2; render();
      snapTimer=setTimeout(()=>{ S.snapStep=3; render(); }, 1300);
    }, 900);
  };
  const snapConfirm=document.getElementById('snapConfirmBtn');
  if(snapConfirm) snapConfirm.onclick=()=>{
    LINE_ITEMS.push({
      n:LINE_ITEMS.length+1, date:SNAP_CANDIDATE.date, merchant:SNAP_CANDIDATE.merchant,
      sub:SNAP_CANDIDATE.sub, cat:SNAP_CANDIDATE.cat, gl:SNAP_CANDIDATE.gl,
      amt:SNAP_CANDIDATE.amt, src:'snap', ok:true
    });
    TRIP.total = LINE_ITEMS.reduce((a,it)=>a+it.amt,0);
    S.snapAdded=true; S.snapStep=0;
    render();
  };
  const snapCancel=document.getElementById('snapCancelBtn');
  if(snapCancel) snapCancel.onclick=()=>{ S.snapStep=0; render(); };

  // Screen 5 — approve
  const approve=document.getElementById('approveBtn');
  if(approve) approve.onclick=()=>{ S.approved=true; render(); };
  const sendback=document.getElementById('sendbackBtn');
  if(sendback) sendback.onclick=()=>{ S.sentBack=true; S.submitted=false; S.exceptionResolved=false; render(); };

  // Trip-watch timer
  if(S.role==='employee' && S.empStep===3){
    const slot=document.getElementById('notifSlot');
    const step=document.getElementById('assembleStep');
    watchTimer=setTimeout(()=>{
      if(step){ step.classList.remove('pending'); step.classList.add('done');
        step.querySelector('.wtick').innerHTML=svg('checkSm'); }
      if(slot){ slot.innerHTML=notifCard();
        const rb=document.getElementById('reviewBtn');
        if(rb) rb.onclick=()=>go(()=>{ S.empStep=4; });
      }
    }, 2200);
  }
}

function sendMessage(text){
  // Allow re-send when the user has navigated Back to chat (chatAdvanced).
  if(S.chatSent && !S.chatAdvanced) return;
  S.chatSent=true;
  S.chatAdvanced=false;
  S.chatText=text;
  const win=document.getElementById('chatWindow');
  win.innerHTML='';
  // user bubble
  const u=document.createElement('div');
  u.className='bubble user';
  u.innerHTML='<div class="avatar user">A</div><div class="bubble-body">'+text+'</div>';
  win.appendChild(u);
  // thinking
  const t=document.createElement('div');
  t.className='bubble agent';
  t.innerHTML='<div class="avatar agent">'+svg('compass')+'</div><div class="bubble-body"><div class="thinking"><i></i><i></i><i></i></div></div>';
  win.appendChild(t);
  setTimeout(()=>go(()=>{ S.empStep=2; S.chatAdvanced=true; }), 1500);
}

function resolveException(){
  S.exceptionResolved=true;
  render();
}

function newTripReset(){
  // Before resetting, ARCHIVE the current trip into the Expense Agent's
  // "Already handled" history so it doesn't vanish when a new trip is booked.
  // Only archive if the trip actually reached the report stage (empStep 4).
  if(S.empStep===4){
    const status = S.approved ? 'Approved'
                 : S.sentBack ? 'Sent back'
                 : S.submitted ? 'Awaiting approval'
                 : 'Draft';
    // Prepend so the most-recent handled trip shows first.
    PAST_REPORTS.unshift({ name:TRIP.name, dates:TRIP.dates, total:TRIP.total, status:status });
  }
  // Reset the employee travel+expense journey back to a fresh chat so the user
  // can book another trip. Keeps role=employee; does NOT touch manager/finance.
  S.role='employee'; S.empStep=1; S.view='main';
  S.chatSent=false; S.chatAdvanced=false; S.chatText='';
  S.exceptionResolved=false; S.submitted=false; S.approved=false; S.apprCleared=false; S.sentBack=false;
  S.expPreview=false; S.snapStep=0; S.snapAdded=false; S.travelApprovalRequested=false;
  LINE_ITEMS.length=ORIGINAL_ITEM_COUNT; TRIP.total=ORIGINAL_TOTAL;
  NAV_HISTORY.length=0;
  render();
}

function restart(){
  S.role='employee'; S.empStep=1; S.chatSent=false; S.chatText='';
  S.exceptionResolved=false; S.submitted=false; S.approved=false; S.apprCleared=false; S.sentBack=false;
  S.tipsSeen={}; S.activeTip=null; // re-arm one-time tips (they show again only if the toggle is ON)
  S.view='main'; S.expPreview=false; S.mgrView='approvals'; S.finView='orgspend';
  S.snapStep=0; S.snapAdded=false; S.travelApprovalRequested=false;
  LINE_ITEMS.length=ORIGINAL_ITEM_COUNT; TRIP.total=ORIGINAL_TOTAL;
  S.chatAdvanced=false;
  PAST_REPORTS.length=0; ORIGINAL_PAST_REPORTS.forEach(r=>PAST_REPORTS.push(JSON.parse(JSON.stringify(r))));
  BUDGET_REQUESTS[0].status='pending'; BUDGET_REQUESTS[1].status='pending'; BUDGET_REQUESTS[2].status='approved';
  NAV_HISTORY.length=0;
  render();
}

document.getElementById('restartBtn').onclick=restart;
document.getElementById('backBtn').onclick=goBack;

// ---------- Tooltip engine (6 one-time tips, master toggle) ----------
// Order & context of the 6 tips:
//  role     — #1 role switcher (first load)
//  restart  — #6 restart button (after #1)
//  expense  — #2 Employee > Expense Agent sub-tab
//  teamspend— #3 Manager > Team Spend sub-tab
//  budgets  — #4 Finance > Budget Approvals sub-tab
//  roi      — #5 Finance > Agent ROI sub-tab (after #4)
function candidateTip(){
  // Returns the id of the tooltip that SHOULD show for the current screen, or null.
  // KEY: sub-tab tooltips fire BEFORE the user clicks the tab — they point at a
  // sub-view the user has NOT yet opened, inviting the click. So each is gated on
  // being in that role but still on that role's DEFAULT sub-view.
  if(!S.tipsOn) return null;

  if(S.role==='employee'){
    // First load intro on the chat screen: #1 role, then #6 restart (staggered).
    if(S.view==='main' && S.empStep===1){
      if(!S.tipsSeen.role) return 'role';
      if(!S.tipsSeen.restart) return 'restart';
    }
    // #2 Expense Agent — show while NOT yet in the hub (invites the click).
    // Only after the intro pair (#1/#6) has been seen, so the first screen isn't crowded.
    if(S.view!=='expenseHub' && S.tipsSeen.role && S.tipsSeen.restart && !S.tipsSeen.expense) return 'expense';
  }

  if(S.role==='manager'){
    // #3 Team Spend — show while on the default Approvals view (invites the click).
    if(S.mgrView!=='teamspend' && !S.tipsSeen.teamspend) return 'teamspend';
  }

  if(S.role==='finance'){
    // #4 Budget Approvals then #5 Agent ROI — sequential, shown while on the
    // default Org Spend view (each invites its click), #4 must be seen before #5.
    if(S.finView!=='budgets' && !S.tipsSeen.budgets) return 'budgets';
    if(S.finView!=='roi' && S.tipsSeen.budgets && !S.tipsSeen.roi) return 'roi';
  }
  return null;
}
function tipEngine(){
  const next = candidateTip();
  S.activeTip = next;
  renderRoles();       // toggles role/restart bubble visibility
  // Always re-render the pipeline so any previously-drawn sub-nav bubble is
  // cleared (e.g. after the × is clicked) and a new one is drawn only if the
  // current tip is a sub-nav tip. Re-rendering here is cheap and idempotent.
  renderPipeline();
}
function dismissTip(){
  if(S.activeTip){ S.tipsSeen[S.activeTip]=true; }
  tipEngine();  // re-evaluate; may reveal the next staggered/sequential tip
}
document.getElementById('roleTipClose').onclick=dismissTip;
document.getElementById('restartTipClose').onclick=dismissTip;

// Master toggle: OFF hides everything immediately; ON re-arms unseen tips for this screen.
document.getElementById('tipsToggle').onclick=(e)=>{
  S.tipsOn = e.target.checked;
  if(!S.tipsOn){ S.activeTip=null; renderRoles(); renderPipeline(); }
  else { tipEngine(); }
};

function goToStage(key){
  // Each tab's ribbon only ever switches sub-views within that tab — it never jumps persona.
  go(()=>{
    if(key==='travel'){ S.view='main'; if(S.empStep>2) S.empStep=2; }
    else if(key==='expense'){ S.view='expenseHub'; }
    else if(key==='approvals'){ S.mgrView='approvals'; }
    else if(key==='teamspend'){ S.mgrView='teamspend'; }
    else if(key==='orgspend'){ S.finView='orgspend'; }
    else if(key==='budgets'){ S.finView='budgets'; }
    else if(key==='roi'){ S.finView='roi'; }
  });
}

// init
render();
</script>
