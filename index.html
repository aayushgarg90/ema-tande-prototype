function render(){
  if(watchTimer){clearTimeout(watchTimer);watchTimer=null;}
  renderRoles();
  renderPipeline();
  document.getElementById('backBtn').disabled = NAV_HISTORY.length===0;
  const stage=document.getElementById('stage');
  let html='';

  if(S.role==='employee' && S.view==='expenseHub'){
    html=screenExpenseHub();
  } else if(S.role==='employee'){
    if(S.empStep===1) html=screenChat();
    else if(S.empStep===2) html=screenItinerary();
    else if(S.empStep===3) html=screenTripWatch();
    else if(S.empStep===4){
      html=screenReport();
      if(S.submitted){
        html+=guideToHub('Submitted for approval','Track its status anytime from here — no need to go anywhere. You’ll see it move to approved (or back to you) the moment your manager acts.','View in Expense Agent');
        html+='<div class="new-trip-cta"><button class="btn btn-primary" id="newTripSuccessBtn">'+svg('compass')+'Book a new trip</button></div>';
      }
    }
  } else if(S.role==='manager'){
    html = S.mgrView==='teamspend' ? screenTeamSpend() : screenApprovals();
  } else {
    html = S.finView==='budgets' ? screenBudgetApprovals() : S.finView==='roi' ? screenAgentROI() : screenOrgSpend();
  }

  // Always-available "New trip" affordance on employee screens past the chat
  // (itinerary / trip-watch / report / expense hub). On the chat screen you're
  // already at the start, so we don't show it there.
  if(S.role==='employee' && !(S.view==='main' && S.empStep===1)){
    html += '<div class="new-trip-float"><button class="btn btn-ghost" id="newTripFloatBtn" title="Start a fresh trip">'+svg('compass')+'New trip</button></div>';
  }
  // One-shot notice when "New trip" was just blocked by the 3-trip cap —
  // shown for exactly this render, then auto-clears.
  if(S.tripCapNotice){
    html = '<div class="guide" style="border-color:var(--warn-line);background:var(--warn-tint);margin-bottom:16px">'
      +   '<div class="g-ic" style="background:#fff;color:var(--warn)">'+svg('alert')+'</div>'
      +   '<div class="g-txt"><b>3-trip limit reached</b><span>All 3 tracked trips are still open. Get one approved (or send one back and resubmit) before booking another.</span></div>'
      + '</div>' + html;
    S.tripCapNotice=false;
  }
  stage.innerHTML=html;
  stage.firstElementChild && stage.firstElementChild.classList.add('screen');
  wire();
  if(typeof tipEngine==='function') tipEngine();
}

function wire(){
  // Role tabs
  document.querySelectorAll('.role-btn').forEach(b=>{
    b.onclick=()=>go(()=>{ S.role=b.dataset.role; S.view='main'; S.mgrView='approvals'; S.finView='orgspend'; });
  });
  // goto buttons (in guides / success heroes)
  document.querySelectorAll('[data-goto]').forEach(b=>{
    b.onclick=()=>go(()=>{ S.role=b.dataset.goto; S.view='main'; S.mgrView='approvals'; S.finView='orgspend'; });
  });

  // Expense hub — preview CTA on the ready-to-approve report
  const reviewReady=document.getElementById('reviewReadyBtn');
  if(reviewReady) reviewReady.onclick=()=>{ S.expPreview=true; render(); };

  // Expense hub — jump into any tracked trip's report at whatever stage it's
  // at. Switches the active trip first (saving whatever was open) if needed.
  document.querySelectorAll('[data-open-trip]').forEach(b=>{
    b.onclick=()=>{
      const id=b.dataset.openTrip;
      if(id!==S.activeTripId){ saveActiveTrip(); loadTrip(id); }
      go(()=>{ S.view='main'; S.role='employee'; S.empStep=4; });
    };
  });

  // Same-tab nudge after submitting
  const gth=document.getElementById('guideToHubBtn');
  if(gth) gth.onclick=()=>go(()=>{ S.view='expenseHub'; });

  // Book a new trip — success screen + always-available pill
  const ntSuccess=document.getElementById('newTripSuccessBtn');
  if(ntSuccess) ntSuccess.onclick=newTripReset;
  const ntFloat=document.getElementById('newTripFloatBtn');
  if(ntFloat) ntFloat.onclick=newTripReset;

  // Manager: 'Back to approvals' — clears the one-time confirmation and
  // returns to the queue (shows the next pending trip, if any). Stays in the
  // Manager role (no Finance jump).
  const backAppr=document.getElementById('backToApprovalsBtn');
  if(backAppr) backAppr.onclick=()=>{ S.mgrConfirm=null; S.mgrView='approvals'; render(); };

  // Budget approvals — finance sign-off
  document.querySelectorAll('[data-budget-approve]').forEach(b=>{
    b.onclick=()=>{ BUDGET_REQUESTS.find(r=>r.id===+b.dataset.budgetApprove).status='approved'; render(); };
  });
  document.querySelectorAll('[data-budget-reject]').forEach(b=>{
    b.onclick=()=>{ BUDGET_REQUESTS.find(r=>r.id===+b.dataset.budgetReject).status='rejected'; render(); };
  });

  // Screen 1 — chat (every message calls Claude via /api/chat)
  const chip=document.getElementById('promptChip');
  const input=document.getElementById('chatInput');
  const send=document.getElementById('sendBtn');
  if(chip) chip.onclick=()=>sendMessage(chip.dataset.prompt);
  if(send) send.onclick=()=>{ if(input){ const v=input.value; input.value=''; sendMessage(v); } };
  if(input) input.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); const v=input.value; input.value=''; sendMessage(v); } };

  // Trip form fields are directly editable — typing updates state live
  // (via targeted DOM updates, not a full render, so focus isn't lost).
  document.querySelectorAll('[data-trip-field]').forEach(inp=>{
    inp.oninput=()=>{
      const k=inp.dataset.tripField;
      const v=inp.value.trim();
      S.trip[k]=v||null;
      S.formEditsPending.add(k);
      const wrap=inp.closest('.tf-field');
      if(wrap){ wrap.classList.toggle('filled',!!v); wrap.classList.toggle('empty',!v); }
      recomputeTripReady();
      syncTripFormChrome();
    };
    inp.onkeydown=e=>{ if(e.key==='Enter'){ e.preventDefault(); inp.blur(); } };
  });

  const bookTrip=document.getElementById('bookTripBtn');
  if(bookTrip) bookTrip.onclick=()=>{
    go(()=>{ S.empStep=2; applyTripToItinerary(); });
    searchFlights(); // fire the Travel Agent (Kiwi.com MCP search) once the screen switches
  };

  // Keep the transcript scrolled to the latest message; focus the composer.
  const chatWin=document.getElementById('chatWindow');
  if(chatWin) chatWin.scrollTop=chatWin.scrollHeight;
  if(input && !S.chatBusy) input.focus();

  // Screen 2 — real flight results from the Travel Agent
  document.querySelectorAll('[data-choose-flight]').forEach(b=>{
    b.onclick=()=>{ S.chosenFlightId=b.dataset.chooseFlight; render(); };
  });
  const retry=document.getElementById('retrySearchBtn');
  if(retry) retry.onclick=()=>searchFlights();
  const book=document.getElementById('bookBtn');
  if(book && !book.disabled) book.onclick=()=>{
    S.activeTripId = 'trip_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); // this trip now has its own tracked report — see TRIPS
    saveActiveTrip();
    // Assemble the report AND parse the inbox in parallel, then run the real
    // policy check once both have settled (so it evaluates final content, not
    // placeholder data mid-assembly) — the trip-watch screen waits on this.
    reportPromise = Promise.all([generateReport(), checkInbox()]).then(()=>evaluateReport());
    go(()=>{ S.empStep=3; });
  };

  // Screen 3 — review (appears after timer)
  const review=document.getElementById('reviewBtn');
  if(review) review.onclick=()=>go(()=>{ S.empStep=4; });

  // Screen 4 — exception resolve. One card per real flagged item (see
  // screenReport()), so this is a delegated handler rather than fixed ids.
  document.querySelectorAll('[data-resolve-n]').forEach(b=>{
    b.onclick=()=>resolveLineItem(Number(b.dataset.resolveN), b.dataset.resolveKind);
  });
  const submit=document.getElementById('submitBtn');
  if(submit && !submit.disabled) submit.onclick=()=>{ S.submitted=true; S.sentBack=false; saveActiveTrip(); render(); };

  // Screen 4 — snap a receipt: real photo -> Claude vision extraction
  const snapFile=document.getElementById('snapFileInput');
  if(snapFile) snapFile.onchange=()=>{
    const file = snapFile.files && snapFile.files[0];
    snapFile.value=''; // allow re-selecting the same file after an error
    if(!file) return;
    const reader = new FileReader();
    reader.onload=()=>{
      S.snapImage = reader.result;
      S.snapStep=1; S.snapError=''; S.snapExtracted=null; S.snapAdded=false;
      render();
      extractReceipt(reader.result);
    };
    reader.readAsDataURL(file);
  };
  const snapConfirm=document.getElementById('snapConfirmBtn');
  if(snapConfirm) snapConfirm.onclick=()=>{
    const ex=S.snapExtracted;
    if(!ex) return;
    LINE_ITEMS.push({
      n:LINE_ITEMS.length+1, date: ex.date || 'Today', merchant: ex.merchant || 'Receipt',
      sub:'Snapped receipt', cat: ex.category || 'Other', gl: ex.gl || GL_CODES.Other,
      amt: ex.amount || 0, src:'snap', live:true, evaluated:false, flag:null, resolved:false
    });
    TRIP.total = LINE_ITEMS.reduce((a,it)=>a+it.amt,0);
    S.snapAdded=true; S.snapStep=0;
    render();
    evaluateReport(); // real policy check on the new item, same as everything else on the report
  };
  const snapCancel=document.getElementById('snapCancelBtn');
  if(snapCancel) snapCancel.onclick=()=>{ S.snapStep=0; S.snapImage=null; S.snapExtracted=null; S.snapError=''; render(); };

  // Screen 4 — refresh inbox for trip receipts (real IMAP scan, auto-adds
  // matches) — the initial scan already ran at booking time (see bookBtn);
  // this just re-checks for anything new, then policy-checks whatever it finds.
  const checkInboxBtn=document.getElementById('checkInboxBtn');
  if(checkInboxBtn) checkInboxBtn.onclick=()=>checkInbox().then(()=>evaluateReport());

  // Screen 5 — manager re-checks the pending trip against POLICY.md (in case
  // it was edited since this report was first evaluated).
  const refreshAppr=document.getElementById('refreshApprovalBtn');
  if(refreshAppr && !refreshAppr.disabled) refreshAppr.onclick=()=>refreshApproval();

  // Screen 5 — approve. Acts on whichever trip is actually next in the
  // approval queue (pendingApproval()), which may not be the trip currently
  // open in the employee flow — if it is, re-sync the singleton from it.
  const approve=document.getElementById('approveBtn');
  if(approve) approve.onclick=()=>{
    const p=pendingApproval();
    if(!p) return;
    p.approved=true;
    S.mgrConfirm={kind:'approved', name:p.name, dates:p.dates};
    if(p.id===S.activeTripId) loadTrip(p.id);
    render();
  };
  const sendback=document.getElementById('sendbackBtn');
  if(sendback) sendback.onclick=()=>{
    const p=pendingApproval();
    if(!p) return;
    p.sentBack=true; p.submitted=false;
    // Reopen every flagged item so the employee has to re-confirm each one —
    // the manager didn't agree with how (some of) them were resolved.
    p.lineItems.forEach(function(it){ if(it.flag) it.resolved=false; });
    S.mgrConfirm={kind:'sentBack', name:p.name, dates:p.dates};
    if(p.id===S.activeTripId) loadTrip(p.id);
    render();
  };

  // Trip-watch timer — waits for the real /api/generate-report call (kicked
  // off when the trip was booked) before revealing the finished report.
  if(S.role==='employee' && S.empStep===3){
    const slot=document.getElementById('notifSlot');
    const step=document.getElementById('assembleStep');
    watchTimer=setTimeout(()=>{
      Promise.resolve(reportPromise).then(()=>{
        if(step){ step.classList.remove('pending'); step.classList.add('done');
          step.querySelector('.wtick').innerHTML=svg('checkSm'); }
        if(slot){ slot.innerHTML=notifCard();
          const rb=document.getElementById('reviewBtn');
          if(rb) rb.onclick=()=>go(()=>{ S.empStep=4; });
        }
      });
    }, 2200);
  }
}

// ---------- Step 1: booking chat ----------
// The system prompt and JSON schema live server-side (server.js) — the
// client only ever sends the raw message history and gets back a parsed
// {reply, trip, readyToBook} object. No intent classification: every
// message just continues this one directed conversation.

// The bot speaks first — this makes the flow directed from the very start.
const GREETING = "Hi! I'm your travel booking assistant. I'll ask a few quick questions, then find your flights and hotel. To start — what city are you travelling to?";

// Reset the chat to a fresh, bot-led conversation.
function seedChat(){
  S.chatMessages = [{ who:'agent', text:GREETING }];
  S.chatHistory  = [];
  S.trip = {};
  S.tripReady = false;
  S.chatBusy = false;
  S.chatError = '';
  S.formEditsPending = new Set();
  S.flightStatus='idle'; S.flights=[]; S.hotel=null; S.flightNote=''; S.flightError=''; S.chosenFlightId=null;
}

// Trip is "ready" once every required field is known — whether Claude filled
// it in from chat or the traveler typed it directly into the form.
function recomputeTripReady(){
  S.tripReady = TRIP_FIELDS.filter(f=>f.req).every(f=>!!S.trip[f.k]);
}

// Live-update the form's chrome (count / book button) without a full render,
// so typing in a field doesn't steal its own focus.
function syncTripFormChrome(){
  const reqFields = TRIP_FIELDS.filter(f=>f.req);
  const filled = reqFields.filter(f=>S.trip[f.k]).length;
  const count=document.getElementById('tfCount');
  if(count) count.textContent = Math.min(filled,reqFields.length)+'/'+reqFields.length+' captured';
  const book=document.getElementById('bookTripBtn');
  if(book) book.disabled = !S.tripReady;
  const label=document.getElementById('tfBookLabel');
  if(label) label.textContent = S.tripReady ? 'Find flights & hotel' : 'Answer the questions above to continue';
}

async function callClaude(){
  const res = await fetch('/api/chat', {
    method:'POST',
    headers:{ 'content-type':'application/json' },
    body: JSON.stringify({ messages:S.chatHistory })
  });
  if(!res.ok){
    let detail=''; try{ const j=await res.json(); detail=(j.error && (j.error.message||j.error))||JSON.stringify(j); }catch(e){ detail=await res.text(); }
    throw new Error('Server '+res.status+' — '+detail+'. Is `node server.js` running with ANTHROPIC_API_KEY set?');
  }
  return res.json(); // server returns {reply, trip, readyToBook} directly
}

async function sendMessage(text){
  if(S.chatBusy) return;
  text=(text||'').trim();
  if(!text) return;
  S.chatError='';
  S.chatMessages.push({who:'user', text});
  // Let Claude know about any fields the traveler typed directly into the
  // form since the last message, so it doesn't re-ask for them.
  let outgoing = text;
  if(S.formEditsPending.size){
    const editedFields = TRIP_FIELDS.filter(f=>S.formEditsPending.has(f.k) && S.trip[f.k]);
    if(editedFields.length){
      outgoing += '\n\n[Trip form updated directly by the traveler: '
        + editedFields.map(f=>f.label+'='+S.trip[f.k]).join(', ') + ']';
    }
    S.formEditsPending.clear();
  }
  S.chatHistory.push({role:'user', content:outgoing});
  S.chatBusy=true; S.chatSent=true;
  render();
  try{
    const out = await callClaude();
    S.chatHistory.push({role:'assistant', content:JSON.stringify(out)});
    const t = out.trip || {};
    // merge — keep previously-known values if the model returns null for them
    ['origin','destination','departDate','returnDate','purpose','travelers'].forEach(k=>{
      if(t[k]) S.trip[k]=t[k];
    });
    S.chatMessages.push({who:'agent', text: out.reply || '…'});
    recomputeTripReady();
  }catch(e){
    S.chatMessages.push({who:'agent', text:'⚠️ '+e.message});
  }finally{
    S.chatBusy=false;
    render();
  }
}

// Carry the parsed trip into the downstream (trip-watch / report) copy for continuity.
function applyTripToItinerary(){
  const t=S.trip;
  if(t.destination) TRIP.name = t.destination + ' · ' + (t.purpose || 'Business trip');
  if(t.departDate && t.returnDate) TRIP.dates = t.departDate + ' – ' + t.returnDate;
  else if(t.departDate) TRIP.dates = t.departDate;
}

// ---------- Step 2: the Travel Agent — real flight search via Kiwi.com MCP ----------
async function searchFlights(){
  S.flightStatus='loading'; S.flightError=''; S.chosenFlightId=null;
  render();
  try{
    const res = await fetch('/api/search-flights', {
      method:'POST',
      headers:{ 'content-type':'application/json' },
      body: JSON.stringify({
        origin: S.trip.origin,
        destination: S.trip.destination,
        departDate: S.trip.departDate,
        returnDate: S.trip.returnDate,
        travelers: S.trip.travelers
      })
    });
    if(!res.ok){
      let detail=''; try{ const j=await res.json(); detail=(j.error && (j.error.message||j.error))||JSON.stringify(j); }catch(e){ detail=await res.text(); }
      throw new Error('Server '+res.status+' — '+detail);
    }
    const data = await res.json();
    S.flights = data.flights || [];
    S.hotel = data.hotel || null;
    S.flightNote = data.note || '';
    S.flightStatus='done';
  }catch(e){
    S.flightError = e.message;
    S.flightStatus='error';
  }
  render();
}

const GL_CODES = {Airfare:'6010', Lodging:'6020', 'Ground transport':'6030', Meals:'6040', Other:'6050'};

// ---------- Step 3: Expense Agent — assemble the report from the real booking ----------
// Kicked off once when the trip is booked (see the bookBtn handler in wire()).
// Amounts always come from the real flight/hotel data, never from the model —
// only merchant text, subtitle and categorization are Claude's job.
async function generateReport(){
  const flight = S.flights.find(f=>f.id===S.chosenFlightId);
  const hotel = S.hotel;
  if(!flight || !hotel) return;
  const nights = hotel.nights || 1;
  const hotelTotal = Math.round(hotel.rate*nights*100)/100;
  const date = S.trip.departDate || LINE_ITEMS[0].date;
  try{
    const res = await fetch('/api/generate-report', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ flight, hotel, trip:S.trip })
    });
    if(!res.ok) throw new Error('Server '+res.status);
    const data = await res.json();
    const items = data.items;
    if(!Array.isArray(items) || items.length!==2) throw new Error('unexpected report shape');
    Object.assign(LINE_ITEMS[0], { merchant:items[0].merchant, sub:items[0].sub, cat:items[0].category, gl:items[0].gl, amt:items[0].amt, date, live:true });
    Object.assign(LINE_ITEMS[1], { merchant:items[1].merchant, sub:items[1].sub, cat:items[1].category, gl:items[1].gl, amt:items[1].amt, date, live:true });
  }catch(e){
    // Fall back to a deterministic (non-LLM) assembly so the report still
    // reflects the real trip even if the Expense Agent call fails. Still
    // "live" — the numbers are the real booking, just not Claude-formatted.
    console.warn('generate-report fell back to local assembly:', e.message);
    Object.assign(LINE_ITEMS[0], {
      merchant:(flight.airline||'Airline')+' '+(flight.flight_number||''),
      sub:(S.trip.origin||'?')+' → '+(S.trip.destination||'?'),
      cat:'Airfare', gl:GL_CODES.Airfare, amt:flight.price, date, live:true
    });
    Object.assign(LINE_ITEMS[1], {
      merchant:hotel.name,
      sub:nights+' night'+(nights>1?'s':'')+(hotel.area?' · '+hotel.area:''),
      cat:'Lodging', gl:GL_CODES.Lodging, amt:hotelTotal, date, live:true
    });
  }
  TRIP.total = LINE_ITEMS.reduce((a,it)=>a+it.amt,0);
}

// ---------- Step 3a-2: Approver Assist — real policy check (/api/evaluate-report) ----------
// Only evaluates items that haven't been judged yet (it.evaluated===false), so
// this can be called again whenever new items show up (a snapped receipt, an
// inbox match) without re-litigating something the traveler already resolved.
// Amounts/categories are never touched here — only flag/reason and the
// manager-facing summary are the model's job.
async function evaluateReport(){
  const toEvaluate = LINE_ITEMS.filter(it => !it.evaluated);
  if(!toEvaluate.length) return;
  S.evaluating = true;
  render();
  try{
    const res = await fetch('/api/evaluate-report', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({
        destination: S.trip.destination, dates: TRIP.dates,
        items: toEvaluate.map(it => ({ n:it.n, merchant:it.merchant, sub:it.sub, cat:it.cat, amt:it.amt }))
      })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || ('Server '+res.status));
    (data.items||[]).forEach(function(r){
      const it = LINE_ITEMS.find(x => x.n===r.n);
      if(it){ it.flag = r.flagged ? r.reason : null; it.evaluated = true; }
    });
    if(data.summary) S.approvalSummary = data.summary;
    if(data.recommendation) S.approvalRecommendation = data.recommendation;
  }catch(e){
    // Fall back to whatever flag each item already shipped with (only the
    // scripted dinner has one) rather than blocking the report entirely.
    console.warn('evaluate-report failed, using fallback flags:', e.message);
    toEvaluate.forEach(it => { it.evaluated = true; });
    if(!S.approvalSummary) S.approvalSummary = 'Policy check unavailable right now — showing the one flagged item this demo ships with by default.';
  }
  S.evaluating = false;
  saveActiveTrip();
  render();
}

// ---------- Manager: re-check the pending trip against POLICY.md right now ----------
// POLICY.md is read fresh on every /api/evaluate-report call (see server.js),
// so editing it takes effect immediately — this button just re-runs the check
// on demand for whichever trip the manager is looking at, in case the policy
// changed after that trip was first evaluated. Re-evaluates every item (not
// just unevaluated ones), since a policy edit can change the verdict on an
// item that was already fine.
async function refreshApproval(){
  const p0 = pendingApproval();
  if(!p0 || S.mgrRefreshing) return;
  const tripId = p0.id;
  S.mgrRefreshing = true; S.mgrRefreshError='';
  render();
  try{
    const res = await fetch('/api/evaluate-report', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({
        destination: p0.name, dates: p0.dates,
        items: p0.lineItems.map(it => ({ n:it.n, merchant:it.merchant, sub:it.sub, cat:it.cat, amt:it.amt }))
      })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || ('Server '+res.status));
    // Re-acquire the trip from TRIPS now — the render() above may have run
    // saveActiveTrip(), which replaces (not mutates) TRIPS[i], detaching any
    // reference captured before this await.
    const p = TRIPS.find(t => t.id === tripId);
    if(p){
      (data.items||[]).forEach(function(r){
        const it = p.lineItems.find(x => x.n===r.n);
        if(it){ it.flag = r.flagged ? r.reason : null; it.evaluated = true; }
      });
      if(data.summary) p.approvalSummary = data.summary;
      if(data.recommendation) p.approvalRecommendation = data.recommendation;
      // If this is also the trip currently open in the employee flow, pull the
      // fresh flags back into the live LINE_ITEMS/S copy.
      if(p.id===S.activeTripId) loadTrip(p.id);
    }
  }catch(e){
    S.mgrRefreshError = e.message || 'Policy re-check failed.';
  }
  S.mgrRefreshing = false;
  render();
}

// ---------- Step 3b: Expense Agent — real receipt photo extraction (Claude vision) ----------
async function extractReceipt(dataUrl){
  const m = dataUrl.match(/^data:([^;]+);base64,(.*)$/s);
  if(!m){ S.snapError='Could not read that file.'; S.snapStep=2; render(); return; }
  try{
    const res = await fetch('/api/extract-receipt', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({ image:m[2], mediaType:m[1] })
    });
    if(!res.ok){
      let detail=''; try{ const j=await res.json(); detail=(j.error && (j.error.message||j.error))||JSON.stringify(j); }catch(e){ detail=await res.text(); }
      throw new Error(detail);
    }
    const data = await res.json();
    if(!data.confident || data.amount==null || !data.merchant){
      S.snapError = data.note || "Couldn't make out the merchant or amount — try a clearer photo.";
      S.snapStep=2;
    }else{
      S.snapExtracted = data;
      S.snapStep=3;
    }
  }catch(e){
    S.snapError = e.message || 'Receipt extraction failed.';
    S.snapStep=2;
  }
  render();
}

// ---------- Step 3c: Expense Agent — scan a real Gmail inbox for receipts ----------
// Runs automatically once the trip is booked (see bookBtn in wire()) and
// again on demand via the Refresh button. A match (subject line == trip
// destination, judged a real receipt) is added straight to the report, same
// as a corporate-card charge — the subject line is already an explicit,
// deliberate signal from the traveler, so no separate confirm step.
async function checkInbox(){
  if(S.inboxChecking || !S.trip.destination) return;
  S.inboxChecking=true; S.inboxError='';
  render();
  try{
    const res = await fetch('/api/check-inbox', {
      method:'POST', headers:{'content-type':'application/json'},
      body: JSON.stringify({
        destination:S.trip.destination,
        resetSeen: !S.inboxChecked // fresh trip -> let previously-judged emails be reconsidered
      })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data.error || ('Server '+res.status));
    const added=[];
    (data.suggestions||[]).forEach(function(sg){
      const it = {
        n:LINE_ITEMS.length+1, date: sg.date || 'Today', merchant: sg.merchant,
        sub:'From inbox — “'+sg.subject+'”', cat: sg.category || 'Other', gl: sg.gl || GL_CODES.Other,
        amt: sg.amount, src:'email', live:true, evaluated:false, flag:null, resolved:false
      };
      LINE_ITEMS.push(it);
      added.push(it);
    });
    if(added.length) TRIP.total = LINE_ITEMS.reduce((a,it)=>a+it.amt,0);
    S.inboxLastAdded = added;
    S.inboxScanned = data.scanned || 0;
    S.inboxChecked = true;
  }catch(e){
    S.inboxError = e.message || 'Inbox check failed.';
  }finally{
    S.inboxChecking=false;
    render();
  }
}

// Resolves ONE flagged line item (n), not the whole report — a report can
// have several real exceptions now, each resolved independently.
function resolveLineItem(n, kind){
  const i = LINE_ITEMS.findIndex(it=>it.n===n);
  if(i<0) return;
  if(kind==='personal'){
    // Actually remove it — a personal expense doesn't belong on the report at all.
    LINE_ITEMS.splice(i,1);
    TRIP.total = LINE_ITEMS.reduce((a,it)=>a+it.amt,0);
  } else {
    const it = LINE_ITEMS[i];
    it.resolved = true;
    // The classic case (an over-limit meal) recodes to Client entertainment,
    // matching the attendees the employee just confirmed. Anything else
    // (lodging, ground transport, etc.) just gets kept as-is, approved.
    if(it.cat==='Meals'){ it.cat='Client entertainment'; it.gl='6045'; }
  }
  render();
}

function newTripReset(){
  // Persist whatever trip is being left — up to 3 tracked at once, each with
  // its own full report, so starting another trip never makes one vanish.
  saveActiveTrip();
  if(!makeRoomForNewTrip()){
    S.tripCapNotice=true;
    render();
    return;
  }
  // Reset the employee travel+expense journey back to a fresh chat so the user
  // can book another trip. Keeps role=employee; does NOT touch manager/finance.
  S.role='employee'; S.empStep=1; S.view='main';
  S.chatSent=false; S.chatAdvanced=false; S.chatText='';
  seedChat();
  S.evaluating=false; S.approvalSummary=''; S.approvalRecommendation=null; S.submitted=false; S.approved=false; S.sentBack=false;
  S.mgrRefreshing=false; S.mgrRefreshError='';
  S.activeTripId=null;
  S.expPreview=false; S.snapStep=0; S.snapImage=null; S.snapExtracted=null; S.snapError='';
  S.snapAdded=false; S.travelApprovalRequested=false;
  S.inboxChecking=false; S.inboxChecked=false; S.inboxScanned=0; S.inboxLastAdded=[]; S.inboxError='';
  reportPromise=null;
  resetLineItems();
  NAV_HISTORY.length=0;
  render();
}

function restart(){
  TRIPS.length=0; S.activeTripId=null; S.mgrConfirm=null; S.tripCapNotice=false;
  S.role='employee'; S.empStep=1; S.chatSent=false; S.chatText='';
  S.evaluating=false; S.approvalSummary=''; S.approvalRecommendation=null; S.submitted=false; S.approved=false; S.sentBack=false;
  S.mgrRefreshing=false; S.mgrRefreshError='';
  S.tipsSeen={}; S.activeTip=null; // re-arm one-time tips (they show again only if the toggle is ON)
  S.view='main'; S.expPreview=false; S.mgrView='approvals'; S.finView='orgspend';
  S.snapStep=0; S.snapImage=null; S.snapExtracted=null; S.snapError='';
  S.snapAdded=false; S.travelApprovalRequested=false;
  S.inboxChecking=false; S.inboxChecked=false; S.inboxScanned=0; S.inboxLastAdded=[]; S.inboxError='';
  reportPromise=null;
  resetLineItems();
  S.chatAdvanced=false;
  seedChat();
  PAST_REPORTS.length=0; ORIGINAL_PAST_REPORTS.forEach(r=>PAST_REPORTS.push(JSON.parse(JSON.stringify(r))));
  BUDGET_REQUESTS[0].status='pending'; BUDGET_REQUESTS[1].status='pending'; BUDGET_REQUESTS[2].status='approved';
  NAV_HISTORY.length=0;
  render();
}

document.getElementById('restartBtn').onclick=restart;
document.getElementById('backBtn').onclick=goBack;

// ---------- Tooltip engine (6 one-time tips, master toggle) ----------
// Order & context of the 6 tips:
//  role     — #1 role switcher (first load)
//  restart  — #6 restart button (after #1)
//  expense  — #2 Employee > Expense Agent sub-tab
//  teamspend— #3 Manager > Team Spend sub-tab
//  budgets  — #4 Finance > Budget Approvals sub-tab
//  roi      — #5 Finance > Agent ROI sub-tab (after #4)
function candidateTip(){
  // Returns the id of the tooltip that SHOULD show for the current screen, or null.
  // KEY: sub-tab tooltips fire BEFORE the user clicks the tab — they point at a
  // sub-view the user has NOT yet opened, inviting the click. So each is gated on
  // being in that role but still on that role's DEFAULT sub-view.
  if(!S.tipsOn) return null;

  if(S.role==='employee'){
    // First load intro on the chat screen: #1 role, then #6 restart (staggered).
    if(S.view==='main' && S.empStep===1){
      if(!S.tipsSeen.role) return 'role';
      if(!S.tipsSeen.restart) return 'restart';
    }
    // #2 Expense Agent — show while NOT yet in the hub (invites the click).
    // Only after the intro pair (#1/#6) has been seen, so the first screen isn't crowded.
    if(S.view!=='expenseHub' && S.tipsSeen.role && S.tipsSeen.restart && !S.tipsSeen.expense) return 'expense';
  }

  if(S.role==='manager'){
    // #3 Team Spend — show while on the default Approvals view (invites the click).
    if(S.mgrView!=='teamspend' && !S.tipsSeen.teamspend) return 'teamspend';
  }

  if(S.role==='finance'){
    // #4 Budget Approvals then #5 Agent ROI — sequential, shown while on the
    // default Org Spend view (each invites its click), #4 must be seen before #5.
    if(S.finView!=='budgets' && !S.tipsSeen.budgets) return 'budgets';
    if(S.finView!=='roi' && S.tipsSeen.budgets && !S.tipsSeen.roi) return 'roi';
  }
  return null;
}
function tipEngine(){
  const next = candidateTip();
  S.activeTip = next;
  renderRoles();       // toggles role/restart bubble visibility
  // Always re-render the pipeline so any previously-drawn sub-nav bubble is
  // cleared (e.g. after the × is clicked) and a new one is drawn only if the
  // current tip is a sub-nav tip. Re-rendering here is cheap and idempotent.
  renderPipeline();
}
function dismissTip(){
  if(S.activeTip){ S.tipsSeen[S.activeTip]=true; }
  tipEngine();  // re-evaluate; may reveal the next staggered/sequential tip
}
document.getElementById('roleTipClose').onclick=dismissTip;
document.getElementById('restartTipClose').onclick=dismissTip;

// Master toggle: OFF hides everything immediately; ON re-arms unseen tips for this screen.
document.getElementById('tipsToggle').onclick=(e)=>{
  S.tipsOn = e.target.checked;
  if(!S.tipsOn){ S.activeTip=null; renderRoles(); renderPipeline(); }
  else { tipEngine(); }
};

function goToStage(key){
  // Each tab's ribbon only ever switches sub-views within that tab — it never jumps persona.
  go(()=>{
    if(key==='travel'){ S.view='main'; if(S.empStep>2) S.empStep=2; }
    else if(key==='expense'){ S.view='expenseHub'; }
    else if(key==='approvals'){ S.mgrView='approvals'; }
    else if(key==='teamspend'){ S.mgrView='teamspend'; }
    else if(key==='orgspend'){ S.finView='orgspend'; }
    else if(key==='budgets'){ S.finView='budgets'; }
    else if(key==='roi'){ S.finView='roi'; }
  });
}

// init
seedChat();   // bot greets first so the flow is directed from the start
render();
</script>
